name: Create Installer Release

on:
  workflow_dispatch:
    inputs:
      img_link:
        description: 'rootfs image link (.img, .zip, .tar, .xz, .gz, .bz2, .zst)'
        required: true
      efi_link:
        description: 'EFI link (.efi, .zip, .tar, .xz, .gz, .bz2, .zst)'
        required: true
      release_tag:
        description: 'Release tag (e.g., ubuntu-26.04-installer-v1.0)'
        required: true

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y p7zip-full xz-utils zstd
        
      - name: Setup variables
        id: vars
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          echo "zip_name=Nabu-Linux-Installer-${TAG}.zip" >> $GITHUB_OUTPUT
          echo "release_name=Nabu-Linux-Installer-${TAG}" >> $GITHUB_OUTPUT
          
          FILENAME=$(basename "${{ github.event.inputs.img_link }}")
          if echo "$FILENAME" | grep -qi "fedora"; then
            LINUX_NAME="fedora"
          elif echo "$FILENAME" | grep -qi "ubuntu"; then
            LINUX_NAME="ubuntu"
          elif echo "$FILENAME" | grep -qi "arch"; then
            LINUX_NAME="arch"
          elif echo "$FILENAME" | grep -qi "debian"; then
            LINUX_NAME="debian"
          else
            LINUX_NAME="linux"
          fi
          echo "linux_name=${LINUX_NAME}" >> $GITHUB_OUTPUT
          
      - name: Download and extract rootfs image
        run: |
          rm -rf image/* 2>/dev/null || true
          mkdir -p image
          wget -qO rootfs.dl "${{ github.event.inputs.img_link }}"
          
          if 7z x rootfs.dl -oextract_img -y >/dev/null 2>&1; then
            # Take any file extracted (should be the .img file)
            IMG_FILE=$(find extract_img -type f -not -name "rootfs.dl" | head -1)
            if [ -n "$IMG_FILE" ]; then
              mv "$IMG_FILE" image/rootfs.img
            else
              echo "No files extracted"
              exit 1
            fi
          else
            FILE_TYPE=$(file -b rootfs.dl)
            if echo "$FILE_TYPE" | grep -qi "Zstandard"; then
              zstd -d rootfs.dl -o image/rootfs.img
            elif echo "$FILE_TYPE" | grep -qi "XZ"; then
              xz -d -c rootfs.dl > image/rootfs.img
            elif echo "$FILE_TYPE" | grep -qi "gzip"; then
              gunzip -c rootfs.dl > image/rootfs.img
            elif echo "$FILE_TYPE" | grep -qi "bzip2"; then
              bunzip2 -c rootfs.dl > image/rootfs.img
            else
              cp rootfs.dl image/rootfs.img
            fi
          fi
          
          if [ ! -f image/rootfs.img ]; then
            echo "Failed to extract rootfs image"
            exit 1
          fi
          
      - name: Download and extract EFI file
        run: |
          LINUX_NAME="${{ steps.vars.outputs.linux_name }}"
          
          find efi -mindepth 1 -maxdepth 1 ! -iname "android" ! -iname "boot" ! -iname "microsoft" -exec rm -rf {} + 2>/dev/null || true
          
          mkdir -p "efi/${LINUX_NAME}"
          wget -qO efi.dl "${{ github.event.inputs.efi_link }}"
          
          TMP_DIR="tmp_efi_$$"
          mkdir -p "$TMP_DIR"
          
          if 7z x efi.dl -o"$TMP_DIR" -y >/dev/null 2>&1; then
            cp -rn "$TMP_DIR"/* "efi/${LINUX_NAME}/" 2>/dev/null || true
          else
            FILE_TYPE=$(file -b efi.dl)
            if echo "$FILE_TYPE" | grep -qi "Zstandard"; then
              zstd -d efi.dl -o "$TMP_DIR/boot.efi"
            elif echo "$FILE_TYPE" | grep -qi "XZ"; then
              xz -d -c efi.dl > "$TMP_DIR/boot.efi"
            elif echo "$FILE_TYPE" | grep -qi "gzip"; then
              gunzip -c efi.dl > "$TMP_DIR/boot.efi"
            elif echo "$FILE_TYPE" | grep -qi "bzip2"; then
              bunzip2 -c efi.dl > "$TMP_DIR/boot.efi"
            else
              cp efi.dl "$TMP_DIR/boot.efi"
            fi
            cp -rn "$TMP_DIR"/* "efi/${LINUX_NAME}/" 2>/dev/null || true
          fi
          
          rm -rf "$TMP_DIR"
          
          find "efi/${LINUX_NAME}" -type f -iname "*.efi" | grep -q . || { echo "No .efi files found"; exit 1; }
          
      - name: Create installer ZIP
        run: |
          7z a -tzip "${{ steps.vars.outputs.zip_name }}" README.md bin/ DBKP/ efi/ image/ META-INF/ > /dev/null
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.vars.outputs.release_name }}
          path: |
            bin/
            DBKP/
            efi/
            image/
            META-INF/
            README.md
          if-no-files-found: error
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ steps.vars.outputs.release_name }}
          files: ${{ steps.vars.outputs.zip_name }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}