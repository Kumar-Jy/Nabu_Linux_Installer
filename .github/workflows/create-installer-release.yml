name: Create Installer Release

on:
  workflow_dispatch:
    inputs:
      img_link:
        description: 'Download link for Linux image'
        required: true
      efi_link:
        description: 'Download link for EFI file'
        required: true
      release_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true

permissions:
  contents: write
  
jobs:
  create-release:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Install extractors
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full zstd xz-utils unzip tar gzip bzip2
      
      - name: Generate file names
        id: names
        run: |
          FILENAME=$(basename "${{ github.event.inputs.img_link }}" | sed 's/?.*//')
          CLEAN_NAME=$(echo "$FILENAME" | sed 's/\.img$//' | sed 's/\.xz$//' | sed 's/\.zst$//' | sed 's/\.gz$//' | sed 's/\.bz2$//' | sed 's/\.tar$//' | sed 's/\.7z$//' | sed 's/\.zip$//' | sed 's/\.raw$//')
          echo "zip_name=Nabu_${CLEAN_NAME}_Installer.zip" >> $GITHUB_OUTPUT
          echo "release_name=${CLEAN_NAME}-Installer" >> $GITHUB_OUTPUT
      
      - name: Extract Linux image
        run: |
          mkdir -p image
          wget -O linux.file "${{ github.event.inputs.img_link }}"
          
          case "${{ github.event.inputs.img_link }}" in
            *.zst) zstd -d linux.file -o linux.img ;;
            *.xz) xz -d linux.file && mv linux.file linux.img 2>/dev/null || mv linux.file.linux.img linux.img ;;
            *.gz) gunzip -c linux.file > linux.img ;;
            *.bz2) bunzip2 -c linux.file > linux.img ;;
            *.tar) tar -xf linux.file && find . -maxdepth 1 -name "*.img" -exec mv {} linux.img \; ;;
            *.zip) unzip -q linux.file && find . -maxdepth 1 -name "*.img" -exec mv {} linux.img \; ;;
            *.7z) 7z x linux.file -y && find . -maxdepth 1 -name "*.img" -exec mv {} linux.img \; ;;
            *) cp linux.file linux.img ;;
          esac
          
          if [ -f linux.img ]; then
            cp linux.img image/linux.img
            echo "âś“ Linux image extracted"
          else
            echo "âś— Failed to extract Linux image"
            exit 1
          fi
      
      - name: Extract EFI files (exclude Android/Boot case-insensitive)
        run: |
          mkdir -p efi/linux
          wget -O efi.file "${{ github.event.inputs.efi_link }}"
          
          # Extract everything
          unzip -q efi.file -d efi_full/
          
          # Remove Android and Boot directories (case-insensitive)
          echo "Removing Android and Boot directories (any case)..."
          find efi_full -type d -iname "android" -exec rm -rf {} + 2>/dev/null || true
          find efi_full -type d -iname "boot" -exec rm -rf {} + 2>/dev/null || true
          
          # Find and copy ALL .efi files from remaining structure (case-insensitive for extension too)
          EFI_FILES=$(find efi_full -type f -iname "*.efi")
          EFI_COUNT=$(echo "$EFI_FILES" | grep -c "\.efi" || echo 0)
          
          if [ $EFI_COUNT -gt 0 ]; then
            echo "$EFI_COUNT EFI file(s) found:"
            echo "$EFI_FILES" | while read -r file; do
              if [ -n "$file" ]; then
                cp "$file" efi/linux/
                echo "  âś“ Copied: $(basename "$file")"
              fi
            done
            echo "âś“ All $EFI_COUNT EFI files copied to efi/linux/"
            ls -lh efi/linux/
          else
            echo "âś— No .efi files found"
            echo "Full directory structure for debugging:"
            find efi_full -type d | head -20
            exit 1
          fi
      
      - name: Create installer ZIP
        run: |
          7z a -tzip "${{ steps.names.outputs.zip_name }}" README.md bin/ DBKP/ efi/ image/ META-INF/ > /dev/null
          echo "âś“ Created: ${{ steps.names.outputs.zip_name }}"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.names.outputs.release_name }}
          path: |
            bin
            DBKP
            efi
            image
            META-INF
            README.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ steps.names.outputs.release_name }}
          files: ${{ steps.names.outputs.zip_name }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
