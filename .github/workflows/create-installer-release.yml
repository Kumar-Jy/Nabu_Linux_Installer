name: Create Installer Release

on:
  workflow_dispatch:
    inputs:
      img_link:
        description: 'Download link for Linux image'
        required: true
      efi_link:
        description: 'Download link for EFI file'
        required: true
      release_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install extractors
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full zstd xz-utils unzip tar gzip bzip2
      
      - name: Generate file names
        id: names
        run: |
          FILENAME=$(basename "${{ github.event.inputs.img_link }}" | sed 's/?.*//')
          # Remove ALL common extensions
          CLEAN_NAME=$(echo "$FILENAME" | sed 's/\.img$//' | sed 's/\.xz$//' | sed 's/\.zst$//' | sed 's/\.gz$//' | sed 's/\.bz2$//' | sed 's/\.tar$//' | sed 's/\.7z$//' | sed 's/\.zip$//' | sed 's/\.raw$//')
          echo "zip_name=Nabu_${CLEAN_NAME}_Installer.zip" >> $GITHUB_OUTPUT
          echo "release_name=${CLEAN_NAME}-Installer" >> $GITHUB_OUTPUT
      
      - name: Extract Linux image
        run: |
          mkdir -p image
          wget -O linux.file "${{ github.event.inputs.img_link }}"
          
          # Try extraction based on file extension
          case "${{ github.event.inputs.img_link }}" in
            *.zst)
              echo "Extracting ZST file..."
              zstd -d linux.file -o linux.img
              ;;
            *.xz)
              echo "Extracting XZ file..."
              xz -d linux.file
              mv linux.file linux.img 2>/dev/null || mv linux.file.linux.img linux.img 2>/dev/null || true
              ;;
            *.gz)
              echo "Extracting GZ file..."
              gunzip -c linux.file > linux.img
              ;;
            *.bz2)
              echo "Extracting BZ2 file..."
              bunzip2 -c linux.file > linux.img
              ;;
            *.tar)
              echo "Extracting TAR file..."
              tar -xf linux.file
              find . -maxdepth 1 -name "*.img" -exec mv {} linux.img \;
              ;;
            *.zip)
              echo "Extracting ZIP file..."
              unzip -q linux.file
              find . -maxdepth 1 -name "*.img" -exec mv {} linux.img \;
              ;;
            *.7z)
              echo "Extracting 7Z file..."
              7z x linux.file -y
              find . -maxdepth 1 -name "*.img" -exec mv {} linux.img \;
              ;;
            *)
              echo "Raw file, using as-is"
              cp linux.file linux.img
              ;;
          esac
          
          # Verify and copy
          if [ -f linux.img ]; then
            cp linux.img image/linux.img
            echo "Successfully extracted Linux image"
          else
            echo "Failed to extract Linux image"
            exit 1
          fi
      
      - name: Extract EFI files
        run: |
          mkdir -p efi/linux
          wget -O efi.file "${{ github.event.inputs.efi_link }}"
          
          # Try extraction based on file extension
          case "${{ github.event.inputs.efi_link }}" in
            *.zip)
              echo "Extracting ZIP file..."
              unzip -q efi.file -d efi_extract/
              ;;
            *.7z)
              echo "Extracting 7Z file..."
              7z x efi.file -oefi_extract -y
              ;;
            *.tar|*.tar.gz|*.tar.xz|*.tar.bz2)
              echo "Extracting TAR file..."
              tar -xf efi.file -C efi_extract/ 2>/dev/null || tar -xf efi.file
              ;;
            *.gz)
              echo "Extracting GZ file..."
              gunzip -c efi.file > efi_extract/boot.efi
              ;;
            *.efi)
              echo "Raw EFI file"
              cp efi.file efi/linux/boot.efi
              ;;
            *)
              echo "Unknown format, trying to find .efi files"
              cp efi.file efi_extract/ 2>/dev/null || true
              ;;
          esac
          
          # Find and copy .efi files
          if [ -d "efi_extract" ]; then
            find efi_extract -name "*.efi" -exec cp {} efi/linux/ \;
          fi
          
          # Verify
          if [ -f efi/linux/*.efi ]; then
            echo "Successfully extracted EFI files"
          else
            echo "Failed to extract EFI files"
            exit 1
          fi
      
      - name: Create installer ZIP
        run: |
          7z a -tzip "${{ steps.names.outputs.zip_name }}" README.md bin/ DBKP/ efi/ image/ META-INF/ > /dev/null
          echo "Created: ${{ steps.names.outputs.zip_name }}"
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ steps.names.outputs.release_name }}
          files: ${{ steps.names.outputs.zip_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux-Installer
          path: ${{ steps.names.outputs.zip_name }}